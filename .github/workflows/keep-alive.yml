name: Keep Render service awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sf "https://opportunity-departures.onrender.com/api/health" \
            -o /dev/null \
            -w "Health check: HTTP %{http_code}\n" \
            || echo "Health check failed - service may be cold-starting, this is non-fatal"
